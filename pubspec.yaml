name: safenest
description: SafeNest - Maternal Safety Wearable Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE
  flutter_blue_plus: ^1.32.12

  # State management
  flutter_riverpod: ^2.5.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Utilities
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  app_settings: ^5.1.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  file_picker: ^10.3.10
  google_sign_in: ^6.2.1
  crypto: ^3.0.3
  local_auth: ^2.3.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
